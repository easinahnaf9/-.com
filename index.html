<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>মাদ্রাসা বাজার - প্রফেশনাল ভার্সন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        :root { --primary: #00695c; --secondary: #ffa000; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; padding-bottom: 90px; overflow-x: hidden; }
        
        /* পেজ ওভারল্যাপ সমস্যার সমাধান */
        .view { display: none !important; min-height: 100vh; background-color: #f3f4f6; }
        .view.active { display: block !important; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .cat-card.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .chat-bubble-me { background-color: var(--primary); color: white; border-radius: 18px 18px 2px 18px; }
        .chat-bubble-other { background-color: white; color: #333; border-radius: 18px 18px 18px 2px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- ১. হোম ভিউ -->
    <div id="homeView" class="view active">
        <header class="bg-[#00695c] p-4 text-white sticky top-0 z-50 rounded-b-[30px] shadow-lg">
            <div class="flex justify-between items-center mb-4 px-1">
                <h1 class="text-xl font-bold italic">মাদ্রাসা বাজার</h1>
                <div class="flex gap-4 items-center">
                    <div onclick="changeView('inboxView')" class="relative cursor-pointer">
                        <i class="fa fa-bell text-xl opacity-80"></i>
                        <!-- নোটিফিকেশন ব্যাজ (শুধু মেসেজ এলে জ্বলবে) -->
                        <span id="notiBadge" class="hidden absolute -top-1 -right-1 bg-amber-400 w-3 h-3 rounded-full border-2 border-[#00695c] animate-bounce"></span>
                    </div>
                </div>
            </div>
            
            <div onclick="openLocationModal()" class="flex items-center justify-between bg-white/10 p-3 rounded-2xl mb-4 border border-white/20 cursor-pointer">
                <span class="text-sm"><i class="fa fa-map-marker-alt text-amber-400 mr-2"></i> <span id="displayLocation">সারা বাংলাদেশ</span></span>
                <i class="fa fa-chevron-down text-[10px] opacity-70"></i>
            </div>

            <div class="bg-white flex items-center px-4 py-3 rounded-2xl text-gray-400">
                <i class="fa fa-search mr-3 text-emerald-600"></i>
                <input type="text" id="searchInput" placeholder="মাদ্রাসা বা পণ্য খুঁজুন..." class="w-full outline-none text-sm text-gray-800 bg-transparent">
            </div>
        </header>

        <div class="p-4 flex gap-3 overflow-x-auto no-scrollbar py-5">
            <button onclick="filterCategory('সব', this)" class="cat-card active shrink-0 px-6 py-2 rounded-full border bg-white text-sm font-bold shadow-sm">সব</button>
            <button onclick="filterCategory('ভর্তি', this)" class="cat-card shrink-0 px-6 py-2 rounded-full border bg-white text-sm font-bold shadow-sm">ভর্তি বিজ্ঞপ্তি</button>
            <button onclick="filterCategory('বই', this)" class="cat-card shrink-0 px-6 py-2 rounded-full border bg-white text-sm font-bold shadow-sm">বই-পুস্তক</button>
            <button onclick="filterCategory('চাকরি', this)" class="cat-card shrink-0 px-6 py-2 rounded-full border bg-white text-sm font-bold shadow-sm">চাকরি</button>
        </div>

        <div class="px-4 pb-10" id="adContainer">
            <p class="text-center py-20 text-gray-400">লোড হচ্ছে...</p>
        </div>
    </div>

    <!-- ২. বিস্তারিত ভিউ (Details Page) -->
    <div id="detailsView" class="view fixed inset-0 bg-white z-[100] hidden overflow-y-auto">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md p-4 flex items-center gap-4 border-b z-50">
            <i onclick="changeView('homeView')" class="fa fa-arrow-left text-xl cursor-pointer p-2"></i>
            <span class="font-bold">বিজ্ঞাপনের বিস্তারিত</span>
        </div>
        <div class="pb-32">
            <img id="detImg" class="w-full h-80 object-cover bg-gray-100">
            <div class="p-6">
                <div class="flex gap-2 mb-4">
                    <span id="detCat" class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase"></span>
                    <span id="detLocTag" class="bg-amber-100 text-amber-700 text-[10px] font-bold px-3 py-1 rounded-full"></span>
                </div>
                <h2 id="detTitle" class="text-2xl font-black text-gray-800 leading-tight"></h2>
                <p id="detDesc" class="mt-6 text-gray-600 text-sm leading-relaxed whitespace-pre-line"></p>
            </div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 z-50">
            <a id="detCall" class="flex-grow bg-emerald-700 text-white text-center py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fa fa-phone-alt"></i> কল করুন
            </a>
            <button id="detChatBtn" class="flex-grow bg-amber-500 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition">
                <i class="fa fa-comment-dots"></i> মেসেজ
            </button>
        </div>
    </div>

    <!-- ৩. ইনবক্স ভিউ (Message List) -->
    <div id="inboxView" class="view p-6">
        <h2 class="text-2xl font-black mb-6">আমার মেসেজসমূহ</h2>
        <div id="chatListContainer" class="space-y-4">
            <p class="text-center text-gray-400 py-10">কোনো মেসেজ নেই</p>
        </div>
    </div>

    <!-- ৪. চ্যাট বক্স (Chat Window) -->
    <div id="chatBoxView" class="view fixed inset-0 bg-gray-50 z-[200] hidden flex flex-col">
        <div class="bg-white p-4 border-b flex items-center gap-4 shadow-sm">
            <i onclick="changeView('inboxView')" class="fa fa-arrow-left text-xl cursor-pointer"></i>
            <span id="chatPartnerName" class="font-bold text-emerald-800">চ্যাট</span>
        </div>
        <div id="messageDisplay" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3"></div>
        <div class="p-4 bg-white border-t flex gap-2">
            <input type="text" id="chatInput" placeholder="কিছু লিখুন..." class="flex-grow bg-gray-100 p-4 rounded-2xl outline-none">
            <button onclick="sendChatMessage()" class="bg-emerald-700 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ৫. পোস্ট ভিউ -->
    <div id="postView" class="view p-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-[35px] shadow-xl border">
            <h2 class="text-2xl font-black mb-6 text-emerald-800">নতুন বিজ্ঞাপন দিন</h2>
            <form id="adForm" class="space-y-4">
                <select id="mCat" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none" required>
                    <option value="">ক্যাটাগরি</option>
                    <option value="ভর্তি">ভর্তি বিজ্ঞপ্তি</option>
                    <option value="বই">বই-পুস্তক</option>
                    <option value="চাকরি">চাকরি</option>
                    <option value="পোশাক">পোশাক</option>
                </select>
                <input type="text" id="mName" placeholder="বিজ্ঞাপনের টাইটেল" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none" required>
                <select id="mLoc" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none" required><option value="">জেলা নির্বাচন করুন</option></select>
                <input type="tel" id="mPhone" placeholder="মোবাইল নম্বর" class="w-full bg-gray-50 p-4 rounded-2xl border outline-none" required>
                <textarea id="mDetails" placeholder="বিস্তারিত বিবরণ..." class="w-full bg-gray-50 p-4 rounded-2xl border h-32 outline-none resize-none" required></textarea>
                <input type="file" id="mImage" accept="image/*" class="text-xs" required>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold shadow-lg">পাবলিশ করুন</button>
            </form>
        </div>
    </div>

    <!-- ৬. প্রোফাইল ভিউ -->
    <div id="profileView" class="view p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-lg text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-20 bg-emerald-700"></div>
            <img id="userImg" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-white relative z-10 shadow-lg object-cover bg-gray-100">
            <h3 id="userName" class="text-xl font-black mt-4 text-gray-800"></h3>
            <button onclick="handleLogout()" class="mt-4 text-red-500 font-bold border bg-red-50 px-8 py-2 rounded-2xl">লগআউট</button>
        </div>
        <div class="mt-8">
            <h4 class="font-bold text-gray-700 mb-4 px-2">আমার বিজ্ঞাপনসমূহ</h4>
            <div id="myAdList" class="space-y-3"></div>
        </div>
    </div>

    <!-- ৭. লগইন ভিউ -->
    <div id="loginView" class="view p-10 flex flex-col items-center justify-center min-h-screen text-center">
        <div class="bg-white p-10 rounded-[45px] shadow-2xl border w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6">লগইন প্রয়োজন</h2>
            <button id="googleLogin" class="w-full flex items-center justify-center gap-4 bg-white border p-4 rounded-2xl font-bold shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6"> গুগল দিয়ে লগইন
            </button>
        </div>
    </div>

    <!-- লোকেশন মোডাল -->
    <div id="locationModal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-6 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white py-2">
                <h3 class="text-xl font-bold">স্থান নির্বাচন করুন</h3>
                <i onclick="closeLocationModal()" class="fa fa-times text-gray-400 text-xl cursor-pointer"></i>
            </div>
            <div id="locationList" class="grid grid-cols-1 gap-2"></div>
        </div>
    </div>

    <!-- বটম নেভিগেশন -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-3 z-[90] shadow-2xl">
        <button onclick="changeView('homeView')" class="nav-item text-emerald-800 text-center w-1/4"><i class="fa fa-home text-xl"></i><p class="text-[10px] font-bold">হোম</p></button>
        <button onclick="checkAuthAndPost()" class="w-1/4 -mt-10"><div class="bg-amber-500 w-14 h-14 rounded-2xl rotate-45 flex items-center justify-center border-4 border-white shadow-lg"><i class="fa fa-plus text-white text-2xl -rotate-45"></i></div></button>
        <button onclick="checkAuthAndInbox()" class="nav-item text-gray-400 text-center w-1/4"><i class="fa fa-comment-dots text-xl"></i><p class="text-[10px] font-bold">মেসেজ</p></button>
        <button onclick="checkAuthAndProfile()" class="nav-item text-gray-400 text-center w-1/4"><i class="fa fa-user-circle text-xl"></i><p class="text-[10px] font-bold">প্রোফাইল</p></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where, deleteDoc, doc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjwJwlJBVeBmQU0QWgxVkWcS-3CQ6PBc0",
            authDomain: "madrass-14912.firebaseapp.com",
            projectId: "madrass-14912",
            storageBucket: "madrass-14912.firebasestorage.app",
            messagingSenderId: "986132379865",
            appId: "1:986132379865:web:2e4a811edf2aa508da26c8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const IMGBB_API = '7a5eacf017aadcfeb81ef6f990a570a6';

        let currentUser = null, allAds = [], selectedCategory = 'সব', selectedLocation = 'সারা বাংলাদেশ', activeChatId = null;

        // ৬৪ জেলার তালিকা
        const districts = ["ঢাকা", "চট্টগ্রাম", "রাজশাহী", "খুলনা", "বরিশাল", "সিলেট", "রংপুর", "ময়মনসিংহ", "কুমিল্লা", "ফেনী", "ব্রাহ্মণবাড়িয়া", "নোয়াখালী", "লক্ষ্মীপুর", "চাঁদপুর", "কক্সবাজার", "রাঙামাটি", "বান্দরবান", "খাগড়াছড়ি", "গাজীপুর", "মানিকগঞ্জ", "মুন্সীগঞ্জ", "নারায়ণগঞ্জ", "নরসিংদী", "ফরিদপুর", "রাজবাড়ী", "গোপালগঞ্জ", "মাদারীপুর", "শরীয়তপুর", "কিশোরগঞ্জ", "টাঙ্গাইল", "পাবনা", "সিরাজগঞ্জ", "বগুড়া", "জয়পুরহাট", "নওগাঁ", "নাটোর", "চাঁপাইনবাবগঞ্জ", "যশোর", "সাতক্ষীরা", "মেহেরপুর", "নড়াইল", "চুয়াডাঙ্গা", "কুষ্টিয়া", "মাগুরা", "বাগেরহাট", "ঝিনাইদহ", "ভোলা", "ঝালকাঠি", "পিরোজপুর", "বরগুনা", "পটুয়াখালী", "পঞ্চগড়", "দিনাজপুর", "লালমনিরহাট", "নীলফামারী", "কুড়িগ্রাম", "ঠাকুরগাঁও", "গাইবান্ধা", "শেরপুর", "জামালপুর", "নেত্রকোণা"];

        // ১. সব বাটন ও পেজ কন্ট্রোল ফিক্সড
        window.changeView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            
            // নেভিগেশন আইকন কালার আপডেট
            document.querySelectorAll('.nav-item').forEach(item => item.classList.replace('text-emerald-800', 'text-gray-400'));
            
            if(id === 'homeView') renderAds();
            if(id === 'inboxView') loadInbox();
            window.scrollTo(0,0);
        };

        window.openLocationModal = () => document.getElementById('locationModal').classList.remove('hidden');
        window.closeLocationModal = () => document.getElementById('locationModal').classList.add('hidden');
        window.setLocation = (loc) => { selectedLocation = loc; document.getElementById('displayLocation').innerText = loc; closeLocationModal(); renderAds(); };

        window.filterCategory = (cat, btn) => {
            selectedCategory = cat;
            document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderAds();
        };

        // ২. নোটিফিকেশন সিস্টেম
        function listenNotifications() {
            if(!currentUser) return;
            onSnapshot(query(collection(db, "chats"), where("users", "array-contains", currentUser.uid)), (snap) => {
                const badge = document.getElementById('notiBadge');
                if(!snap.empty) badge.classList.remove('hidden');
                else badge.classList.add('hidden');
            });
        }

        // ৩. চ্যাট সিস্টেম (মেসেজ)
        window.startChat = (ownerId, ownerName) => {
            if(!currentUser) { changeView('loginView'); return; }
            if(currentUser.uid === ownerId) { alert("নিজের সাথে চ্যাট সম্ভব নয়!"); return; }
            activeChatId = currentUser.uid < ownerId ? `${currentUser.uid}_${ownerId}` : `${ownerId}_${currentUser.uid}`;
            setDoc(doc(db, "chats", activeChatId), { users: [currentUser.uid, ownerId], names: [currentUser.displayName, ownerName], lastUpdate: serverTimestamp() }, { merge: true });
            document.getElementById('chatPartnerName').innerText = ownerName;
            changeView('chatBoxView');
            loadMessages();
        };

        window.sendChatMessage = async () => {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "chats", activeChatId, "messages"), { senderId: currentUser.uid, text: input.value, time: serverTimestamp() });
            input.value = '';
        };

        function loadMessages() {
            onSnapshot(query(collection(db, "chats", activeChatId, "messages"), orderBy("time", "asc")), (snap) => {
                const div = document.getElementById('messageDisplay');
                div.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === currentUser.uid;
                    div.innerHTML += `<div class="${isMe ? 'self-end chat-bubble-me' : 'self-start chat-bubble-other'} p-3 max-w-[80%] shadow-sm text-sm">${m.text}</div>`;
                });
                div.scrollTop = div.scrollHeight;
            });
        }

        function loadInbox() {
            if(!currentUser) return;
            onSnapshot(query(collection(db, "chats"), where("users", "array-contains", currentUser.uid)), (snap) => {
                const container = document.getElementById('chatListContainer');
                container.innerHTML = snap.empty ? '<p class="text-center py-10">কোনো চ্যাট নেই</p>' : '';
                snap.forEach(d => {
                    const c = d.data();
                    const partner = c.users[0] === currentUser.uid ? c.names[1] : c.names[0];
                    const partnerId = c.users[0] === currentUser.uid ? c.users[1] : c.users[0];
                    container.innerHTML += `<div onclick="startChat('${partnerId}', '${partner}')" class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm border">
                        <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center font-bold text-emerald-700">${partner ? partner[0] : 'U'}</div>
                        <div><h4 class="font-bold text-sm">${partner || 'ইউজার'}</h4><p class="text-[10px] text-gray-400">মেসেজ দেখতে ক্লিক করুন</p></div>
                    </div>`;
                });
            });
        }

        // ৪. বিজ্ঞাপন রেন্ডার ও ডিটেইলস (Undefined ফিক্সড)
        window.openDetails = (id) => {
            const ad = allAds.find(a => a.id === id);
            if(!ad) return;
            document.getElementById('detImg').src = ad.imageUrl || '';
            document.getElementById('detTitle').innerText = ad.name || 'টাইটেল নেই';
            document.getElementById('detCat').innerText = ad.category || 'সাধারণ';
            document.getElementById('detLocTag').innerText = ad.location || 'সারা বাংলাদেশ';
            document.getElementById('detDesc').innerText = ad.details || 'কোনো বিবরণ নেই';
            document.getElementById('detCall').href = `tel:${ad.phone}`;
            document.getElementById('detChatBtn').onclick = () => startChat(ad.uid, ad.name || "কর্তৃপক্ষ");
            changeView('detailsView');
        };

        function renderAds() {
            const container = document.getElementById('adContainer');
            container.innerHTML = '';
            let filtered = allAds.filter(ad => (selectedCategory === 'সব' || ad.category === selectedCategory) && (selectedLocation === 'সারা বাংলাদেশ' || ad.location === selectedLocation));
            
            if(filtered.length === 0) { container.innerHTML = '<p class="text-center py-20 text-gray-400">কোনো বিজ্ঞাপন নেই</p>'; return; }
            
            filtered.forEach(ad => {
                container.innerHTML += `<div onclick="openDetails('${ad.id}')" class="bg-white p-3 rounded-[28px] shadow-sm flex gap-4 border border-gray-100 mb-4 active:scale-95 transition">
                    <img src="${ad.imageUrl}" class="w-24 h-24 rounded-2xl object-cover bg-gray-50">
                    <div class="flex-grow flex flex-col justify-between py-1">
                        <div><span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full uppercase">${ad.category || 'সাধারণ'}</span>
                        <h3 class="font-bold text-gray-800 line-clamp-1 mt-1">${ad.name || 'টাইটেল নেই'}</h3>
                        <p class="text-[10px] text-gray-400 mt-1"><i class="fa fa-map-marker-alt"></i> ${ad.location || 'সারা বাংলাদেশ'}</p></div>
                        <span class="text-xs font-bold text-emerald-600">বিস্তারিত...</span>
                    </div></div>`;
            });
        }

        // ৫. ইনিশিয়াল সেটিংস ও অথ লজিক
        onSnapshot(query(collection(db, "ads"), orderBy("createdAt", "desc")), (snap) => { allAds = snap.docs.map(d => ({id: d.id, ...d.data()})); renderAds(); });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userImg').src = user.photoURL;
                listenNotifications();
                loadMyAds(user.uid);
            }
        });

        const init = () => {
            const list = document.getElementById('locationList'), select = document.getElementById('mLoc');
            list.innerHTML = `<button onclick="setLocation('সারা বাংলাদেশ')" class="w-full text-left p-4 rounded-2xl border font-bold text-emerald-700 bg-emerald-50">সারা বাংলাদেশ</button>`;
            districts.forEach(d => {
                list.innerHTML += `<button onclick="setLocation('${d}')" class="w-full text-left p-4 rounded-2xl border hover:bg-gray-50">${d}</button>`;
                select.innerHTML += `<option value="${d}">${d}</option>`;
            });
        };
        init();

        window.checkAuthAndPost = () => currentUser ? changeView('postView') : changeView('loginView');
        window.checkAuthAndProfile = () => currentUser ? changeView('profileView') : changeView('loginView');
        window.checkAuthAndInbox = () => currentUser ? changeView('inboxView') : changeView('loginView');
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, provider).then(() => changeView('homeView'));
        window.handleLogout = () => signOut(auth).then(() => changeView('homeView'));

        function loadMyAds(uid) {
            onSnapshot(query(collection(db, "ads"), where("uid", "==", uid)), (snap) => {
                const list = document.getElementById('myAdList');
                list.innerHTML = '';
                snap.forEach(d => {
                    const ad = d.data();
                    list.innerHTML += `<div class="bg-white p-3 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3">
                            <img src="${ad.imageUrl}" class="w-10 h-10 rounded-xl object-cover">
                            <span class="text-sm font-bold text-gray-700">${ad.name}</span>
                        </div>
                        <button onclick="deleteAd('${d.id}')" class="w-10 h-10 rounded-full bg-red-50 text-red-500"><i class="fa fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        window.deleteAd = async (id) => { if(confirm("মুছে ফেলতে চান?")) await deleteDoc(doc(db, "ads", id)); };

        document.getElementById('adForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "আপলোড হচ্ছে...";
            const fd = new FormData(); fd.append('image', document.getElementById('mImage').files[0]);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: 'POST', body: fd });
                const img = await res.json();
                await addDoc(collection(db, "ads"), { name: document.getElementById('mName').value, category: document.getElementById('mCat').value, location: document.getElementById('mLoc').value, phone: document.getElementById('mPhone').value, details: document.getElementById('mDetails').value, imageUrl: img.data.url, uid: currentUser.uid, createdAt: serverTimestamp() });
                changeView('homeView'); e.target.reset();
            } catch(e) { alert("আপলোড ব্যর্থ হয়েছে!"); }
            finally { btn.disabled = false; btn.innerText = "পাবলিশ করুন"; }
        };
    </script>
</body>
</html>
